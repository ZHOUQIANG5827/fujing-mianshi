<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCJ 辅警题库 · 全国刷题平台</title>
<meta name="description" content="RCJ9527 辅警真题卡组：笔试+面试，按城市刷题。深圳 / 惠州 已上线，武汉 / 成都 筹备中。">
<style>
  :root{
    --primary:#2563eb; --primary-dark:#1d4ed8; --primary-light:#3b82f6;
    --bg:#f4f6fb; --surface:#ffffff; --text:#0f172a; --text-secondary:#64748b;
    --border:#e2e8f0; --radius:16px; --shadow:0 6px 24px rgba(15,23,42,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto;padding:48px 20px 64px}
  .hero{text-align:center;margin-bottom:40px}
  .badge{display:inline-block;background:rgba(37,99,235,.1);color:var(--primary-dark);font-size:13px;font-weight:700;padding:5px 14px;border-radius:999px;margin-bottom:16px}
  .hero h1{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-bottom:10px}
  .hero p{color:var(--text-secondary);font-size:15px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:10px}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(15,23,42,.12)}
  .card-top{display:flex;align-items:center;justify-content:space-between}
  .city{font-size:20px;font-weight:800}
  .tag{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  .tag-live{background:#dcfce7;color:#16a34a}
  .tag-soon{background:#fef3c7;color:#b45309}
  .desc{font-size:13.5px;color:var(--text-secondary)}
  .enter{margin-top:auto;font-size:13.5px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:4px}
  .card.disabled{opacity:.7;pointer-events:none}
  .card.disabled .enter{color:var(--text-secondary)}
  .footer{margin-top:48px;text-align:center;font-size:13px;color:var(--text-secondary)}
  .footer a{color:var(--primary);text-decoration:none;font-weight:700}
  .footer .line{margin-top:6px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span class="badge">RCJ9527 · 辅警真题卡组</span>
      <h1>全国辅警刷题平台</h1>
      <p>笔试 + 面试真题 · 套题模考 · 定向刷题 · 随机抽题点击即判</p>
    </div>

    <div class="grid">
      <a class="card" href="/sz/">
        <div class="card-top"><span class="city">深圳</span><span class="tag tag-live">已上线</span></div>
        <div class="desc">辅警面试 + 笔试真题卡组，含定向刷题与套题模考。</div>
        <div class="enter">进入刷题 →</div>
      </a>

      <a class="card" href="/hz/">
        <div class="card-top"><span class="city">惠州</span><span class="tag tag-live">已上线</span></div>
        <div class="desc">辅警笔试 2136 题官方真题，套题模考 + 定向刷题 + 随机抽题。</div>
        <div class="enter">进入刷题 →</div>
      </a>

      <a class="card disabled" href="#">
        <div class="card-top"><span class="city">武汉</span><span class="tag tag-soon">筹备中</span></div>
        <div class="desc">武汉辅警笔试/面试，题库到位即上线。</div>
        <div class="enter">敬请期待</div>
      </a>

      <a class="card disabled" href="#">
        <div class="card-top"><span class="city">成都</span><span class="tag tag-soon">筹备中</span></div>
        <div class="desc">成都辅警笔试/面试，题库到位即上线。</div>
        <div class="enter">敬请期待</div>
      </a>
    </div>

    <div class="footer">
      <div>更多城市持续上新 · 由 RCJ9527 出品</div>
      <div class="line">完整版 / 答疑：闲鱼 <a href="#">RCJ9527</a> · 微信打赏支持作者</div>
    </div>
  </div>
</body>
</html>
